       <h1>Intramurals Team Checker</h1>

    <label>
        <p>Are you done with the online registration?</p>
        <input type="checkbox" name="registered" id="pw" value="yes"> Yes
        <input type="checkbox" name="registered" id="pw" value="no"> No
    </label>

    <br>

    <label>
        <p>Do you have the medical clearance from the link?</p>
        <input type="checkbox" name="medical check" id="me" value="yes"> Yes
        <input type="checkbox" name="medical check" id="me" value="no"> No
    </label>

    <br>

    <p>What's your grade and section?</p>
    <label>
        <input type="number" name="grade" id="gr" min="7" max="10" placeholder="Enter grade" required> 
    </label>

    <br>

    <label>
        <input type="text" name="section" id="sc" placeholder="Enter section" required>

    <br>
